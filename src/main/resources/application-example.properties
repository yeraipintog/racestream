# ----------------------------------------------------------------------------
# RaceStream - plantilla de configuración local para GitHub
# Copia este archivo como application.properties y rellena tus valores reales.
# Para Railway, no renombres este archivo: usa la plantilla .env.example en
# las variables del servicio y deja application.properties fuera del repositorio.
# ----------------------------------------------------------------------------

spring.application.name=racestream
server.port=8080

# Base de datos MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/racestream_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=TU_USUARIO_MYSQL
spring.datasource.password=TU_PASSWORD_MYSQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Migraciones Flyway
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# APIs externas
openf1.api.base-url=https://api.openf1.org/v1
openf1.auth.username=TU_USUARIO_OPENF1
openf1.auth.password=TU_PASSWORD_OPENF1
openf1.auth.access-token=
openf1.stream.enabled=true
jolpica.api.base-url=https://api.jolpi.ca/ergast/f1
f1db.splitted-json-url=https://github.com/f1db/f1db/releases/latest/download/f1db-json-splitted.zip
gnews.api.base-url=https://gnews.io/api/v4
gnews.api.key=TU_API_KEY_GNEWS
racestream.contact.support-email=TU_CORREO_CONTACTO
racestream.contact.mail-enabled=true
racestream.password-reset.mail-enabled=true
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=TU_CORREO_SMTP
spring.mail.password=TU_APP_PASSWORD_SMTP
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
logging.level.org.springframework.web.client=INFO

