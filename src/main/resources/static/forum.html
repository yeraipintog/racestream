<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceStream - Foro</title>
    <link rel="icon" type="image/png" href="/assets/img/LogoRS2.png">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/account.css">
</head>
<body data-rs-private-page="forum">
<div class="rs-page-shell">
    <header class="rs-navbar" id="mainNavbar"></header>
    <section class="rs-race-strip" id="raceStrip"></section>
    <main class="rs-main rs-simple-page">
        <div class="rs-container">
            <header class="rs-page-head">
                <h1>Foro</h1>
                <p>Comparte dudas, análisis y comentarios sobre Grandes Premios, sesiones, pilotos, escuderías y noticias.</p>
            </header>
            <section class="rs-forum-layout">
                <article class="rs-simple-panel rs-forum-panel">
                    <div class="rs-forum-panel__head">
                        <h2>Publicaciones</h2>
                        <div class="rs-forum-tools">
                            <input id="forumSearch" type="search" placeholder="Buscar mensajes" aria-label="Buscar mensajes">
                            <button id="forumCreateToggle" class="rs-forum-create-button" type="button" aria-label="Crear publicación">+</button>
                        </div>
                    </div>
                    <div id="forumList" class="rs-list">
                        <p class="loading-state">Cargando foro...</p>
                    </div>
                </article>
            </section>
            <section id="forumComposer" class="rs-forum-composer" hidden>
                <div class="rs-simple-panel rs-forum-composer__panel">
                    <div class="rs-forum-panel__head rs-forum-composer__head">
                        <h2>Crear publicación</h2>
                        <button id="forumCreateClose" class="rs-admin-delete-button" type="button" aria-label="Cerrar creador">×</button>
                    </div>
                    <form id="forumForm" class="rs-form">
                        <label>Categoría<select name="category"><option>General</option><option>Grand Prix</option><option>Sesión</option><option>Noticias</option></select></label>
                        <label>
                            Título
                            <input name="title" maxlength="20" required>
                            <small class="rs-char-counter" data-counter-for="title">0/20</small>
                        </label>
                        <label>
                            Mensaje
                            <textarea name="content" maxlength="1000" required></textarea>
                            <small class="rs-char-counter" data-counter-for="content">0/1000</small>
                        </label>
                        <label class="rs-form__inline">
                            <input name="policyAccepted" type="checkbox" required>
                            <span>Acepto la <a href="/privacy-policy.html#forum-policy">política de privacidad</a> y las <a href="/terms.html#forum-policy">normas del foro</a> de RaceStream.</span>
                        </label>
                        <button class="rs-button rs-button--primary" type="submit">Publicar</button>
                        <div id="forumAlert" class="rs-alert" aria-live="polite"></div>
                    </form>
                </div>
            </section>
        </div>
    </main>
    <footer class="rs-footer"></footer>
</div>
<script src="/js/nav.js"></script>
<script src="/js/race-strip.js"></script>
<script src="/js/account.js"></script>
</body>
</html>
