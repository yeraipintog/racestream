<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceStream - Foro</title>
    <link rel="icon" type="image/png" href="/assets/img/LogoRS2.png">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/account.css">
</head>
<body data-rs-private-page="forum">
<div class="rs-page-shell">
    <header class="rs-navbar" id="mainNavbar"></header>
    <section class="rs-race-strip" id="raceStrip"></section>
    <main class="rs-main rs-simple-page">
        <div class="rs-container">
            <header class="rs-page-head">
                <h1>Foro</h1>
                <p>Comparte dudas, análisis y comentarios sobre Grandes Premios, sesiones, pilotos, escuderías y noticias.</p>
            </header>
            <section class="rs-simple-grid">
                <article class="rs-simple-panel">
                    <h2>Publicaciones</h2>
                    <div id="forumList" class="rs-list">
                        <p class="loading-state">Cargando foro...</p>
                    </div>
                </article>
                <article class="rs-simple-panel">
                    <h2>Crear publicación</h2>
                    <form id="forumForm" class="rs-form">
                        <label>Categoría<select name="category"><option>General</option><option>GP</option><option>Sesión</option><option>Noticias</option></select></label>
                        <label>Título<input name="title" required></label>
                        <label>Mensaje<textarea name="content" required></textarea></label>
                        <button class="rs-button rs-button--primary" type="submit">Publicar</button>
                        <div id="forumAlert" class="rs-alert" aria-live="polite"></div>
                    </form>
                </article>
            </section>
        </div>
    </main>
    <footer class="rs-footer"></footer>
</div>
<script src="/js/nav.js"></script>
<script src="/js/race-strip.js"></script>
<script src="/js/account.js"></script>
</body>
</html>
