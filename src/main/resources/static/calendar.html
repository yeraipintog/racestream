<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceStream - Calendario F1</title>
    <link rel="icon" type="image/png" href="/assets/img/LogoRS2.png">

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
<div class="rs-page-shell">
    <header class="rs-navbar" id="mainNavbar"></header>

    <section class="rs-race-strip" id="raceStrip"></section>

    <main class="rs-main">
        <div class="rs-container">
            <section class="rs-calendar-topbar">
                <div class="rs-calendar-topbar__left">
                    <h1 class="rs-calendar-topbar__title">Calendario Fórmula 1</h1>

                    <div class="rs-calendar-topbar__controls">
                        <div class="rs-select-wrap rs-select-wrap--inline">
                            <select id="yearInput" aria-label="Seleccionar temporada">
                                <option value="2023">2023</option>
                                <option value="2024">2024</option>
                                <option value="2025">2025</option>
                                <option value="2026" selected>2026</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="topSelectedCircuit" class="rs-calendar-topbar__selected">-</div>
            </section>

            <section class="rs-layout-2">
                <aside>
                    <div class="rs-calendar-panel">
                        <div class="rs-calendar-panel__header">
                            <div id="calendarMonthLabel" class="rs-calendar-month">-</div>

                            <div class="rs-calendar-nav">
                                <button id="prevMonthButton" class="rs-calendar-nav__button" type="button">&lsaquo;</button>
                                <button id="nextMonthButton" class="rs-calendar-nav__button" type="button">&rsaquo;</button>
                            </div>
                        </div>

                        <div id="calendarGrid" class="rs-calendar-grid"></div>
                        <div id="calendarEvents" class="rs-calendar-events"></div>
                    </div>

                    <div id="calendarInsight" class="rs-calendar-insight"></div>
                </aside>

                <section>
                    <div class="rs-selected-gp-title-row">
                        <h2 id="selectedGpTitle" class="rs-selected-gp-title">Selecciona un Gran Premio</h2>
                        <div id="selectedGpFavorite" class="rs-selected-gp-favorite"></div>
                    </div>

                    <div class="rs-gp-detail-grid">
                        <div id="selectedCircuitCard" class="rs-circuit-card"></div>
                    </div>

                    <div id="sessionsContent"></div>
                </section>
            </section>
        </div>
    </main>

    <footer class="rs-footer"></footer>
</div>

<script src="/js/nav.js"></script>
<script src="/js/race-strip.js"></script>
<script src="/js/f1-assets.js"></script>
<script src="/js/favorites.js"></script>
<script src="/js/calendar.js"></script>
</body>
</html>
