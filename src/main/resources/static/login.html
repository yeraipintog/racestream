<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceStream - Acceso</title>
    <link rel="icon" type="image/png" href="/assets/img/LogoRS2.png">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/account.css">
</head>
<body>
<div class="rs-page-shell">
    <header class="rs-navbar" id="mainNavbar"></header>
    <section class="rs-race-strip" id="raceStrip"></section>
    <main class="rs-main rs-simple-page">
        <div class="rs-container">
            <header class="rs-page-head">
                <h1>Acceso</h1>
                <p>Entra con tu cuenta local o crea una nueva para usar foro, contacto, favoritos y preferencias.</p>
            </header>
            <div class="rs-auth-tabs" aria-label="Elegir acceso">
                <button class="rs-auth-tab" type="button" data-auth-target="loginPanel">Iniciar sesión</button>
                <button class="rs-auth-tab" type="button" data-auth-target="registerPanel">Registrarse</button>
            </div>
            <section class="rs-simple-grid">
                <article id="loginPanel" class="rs-simple-panel rs-auth-panel">
                    <h2>Iniciar sesión</h2>
                    <form id="loginForm" class="rs-form">
                        <label>Usuario o email<input name="email" type="text" autocomplete="username" required></label>
                        <label class="rs-password-field">Contraseña<input name="password" type="password" autocomplete="current-password" required><button class="rs-password-toggle" type="button" data-password-toggle aria-label="Mostrar contraseña" aria-pressed="false">&#128065;</button></label>
                        <button class="rs-auth-secondary" type="button" data-auth-target="resetPanel">¿Has olvidado tu contraseña?</button>
                        <button class="rs-button rs-button--primary" type="submit">Entrar</button>
                        <div id="loginAlert" class="rs-alert" aria-live="polite"></div>
                    </form>
                </article>
                <article id="registerPanel" class="rs-simple-panel rs-auth-panel">
                    <h2>Registro</h2>
                    <form id="registerForm" class="rs-form">
                        <label>Nombre de usuario<input name="name" type="text" autocomplete="username" placeholder="Este usuario será visible" required></label>
                        <label>Email<input name="email" type="email" autocomplete="email" required></label>
                        <label class="rs-password-field">Contraseña<input name="password" type="password" autocomplete="new-password" required><button class="rs-password-toggle" type="button" data-password-toggle aria-label="Mostrar contraseña" aria-pressed="false">&#128065;</button></label>
                        <label>Confirmar contraseña<input name="confirmPassword" type="password" autocomplete="new-password" required></label>
                        <ul class="rs-password-rules" aria-label="Requisitos de contraseña">
                            <li data-password-rule="length">Mínimo 8 caracteres</li>
                            <li data-password-rule="lower">Una letra minúscula</li>
                            <li data-password-rule="upper">Una letra mayúscula</li>
                            <li data-password-rule="number">Un número</li>
                            <li data-password-rule="symbol">Un símbolo</li>
                        </ul>
                        <label class="rs-form__inline"><input name="acceptPolicies" type="checkbox" required> Acepto los términos, privacidad y cookies.</label>
                        <button class="rs-button rs-button--primary" type="submit">Crear cuenta</button>
                        <div id="registerAlert" class="rs-alert" aria-live="polite"></div>
                    </form>
                </article>
                <article id="resetPanel" class="rs-simple-panel rs-auth-panel">
                    <h2>Restablecer contraseña</h2>
                    <form id="resetRequestForm" class="rs-form">
                        <label>Email<input name="email" type="email" autocomplete="email" required></label>
                        <button class="rs-button rs-button--primary" type="submit">Enviar correo</button>
                        <div id="resetRequestAlert" class="rs-alert" aria-live="polite"></div>
                    </form>
                    <form id="resetConfirmForm" class="rs-form" hidden>
                        <input name="token" type="hidden">
                        <label class="rs-password-field">Nueva contraseña<input name="password" type="password" autocomplete="new-password" required><button class="rs-password-toggle" type="button" data-password-toggle aria-label="Mostrar contraseña" aria-pressed="false">&#128065;</button></label>
                        <label>Confirmar contraseña<input name="confirmPassword" type="password" autocomplete="new-password" required></label>
                        <button class="rs-button rs-button--primary" type="submit">Guardar contraseña</button>
                        <div id="resetConfirmAlert" class="rs-alert" aria-live="polite"></div>
                    </form>
                </article>
            </section>
        </div>
    </main>
    <footer class="rs-footer"></footer>
</div>
<script src="/js/nav.js"></script>
<script src="/js/race-strip.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
