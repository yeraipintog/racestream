<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceStream - Clasificación F1</title>
    <link rel="icon" type="image/png" href="/assets/img/LogoRS2.png">

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/standings.css">
</head>
<body>
<div class="rs-page-shell">
    <header class="rs-navbar" id="mainNavbar"></header>

    <section class="rs-race-strip" id="raceStrip"></section>

    <main class="rs-main rs-standings-page">
        <div class="rs-container">
            <section class="rs-calendar-topbar rs-standings-topbar" aria-label="Filtro de temporada">
                <div class="rs-calendar-topbar__left">
                    <h1 class="rs-calendar-topbar__title">Clasificación Fórmula 1</h1>
                    <div class="rs-calendar-topbar__controls">
                        <div class="rs-select-wrap rs-select-wrap--inline">
                            <select id="standingsYearInput" aria-label="Seleccionar temporada"></select>
                        </div>
                    </div>
                </div>
                <div id="standingsSeasonMeta" class="rs-calendar-topbar__selected">Temporada</div>
            </section>

            <section class="rs-standings-switch" aria-label="Elegir tabla de clasificación">
                <button id="standingsDriversTab" class="rs-standings-tab rs-standings-tab--active" type="button" aria-pressed="true">Pilotos</button>
                <button id="standingsConstructorsTab" class="rs-standings-tab" type="button" aria-pressed="false">Escuderías</button>
            </section>

            <section class="rs-standings-panel">
                <div class="rs-standings-panel__head">
                    <div class="rs-standings-panel__left">
                        <h2 id="standingsTableTitle">Clasificación de pilotos</h2>
                        <label class="rs-select-wrap rs-select-wrap--inline rs-standings-filter" aria-label="Filtrar clasificación">
                            <select id="standingsEntityFilter"></select>
                        </label>
                    </div>
                    <div id="standingsSelectedMedia" class="rs-standings-selected-media" aria-hidden="true"></div>
                </div>

                <div id="standingsTableContent"></div>
            </section>
        </div>
    </main>

    <footer class="rs-footer"></footer>
</div>

<script src="/js/nav.js"></script>
<script src="/js/race-strip.js"></script>
<script src="/js/f1-assets.js"></script>
<script src="/js/standings.js"></script>
</body>
</html>
