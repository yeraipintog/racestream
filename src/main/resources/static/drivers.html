<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceStream - Pilotos F1</title>
    <link rel="icon" type="image/png" href="/assets/img/LogoRS2.png">

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/participants.css">
</head>
<body data-rs-page="drivers">
<div class="rs-page-shell">
    <header class="rs-navbar" id="mainNavbar"></header>

    <section class="rs-race-strip" id="raceStrip"></section>

    <main class="rs-main">
        <div class="rs-container">
            <section class="rs-calendar-topbar rs-participants-topbar" aria-label="Filtro de pilotos">
                <div class="rs-calendar-topbar__left">
                    <h1 class="rs-calendar-topbar__title">Pilotos Fórmula 1</h1>
                    <div class="rs-calendar-topbar__controls">
                        <div class="rs-select-wrap rs-select-wrap--inline">
                            <select id="participantsYearInput" aria-label="Seleccionar temporada"></select>
                        </div>
                    </div>
                </div>
                <div id="participantsSeasonMeta" class="rs-calendar-topbar__selected">Temporada</div>
            </section>

            <section id="participantsGrid" class="rs-participants-grid" aria-label="Listado de pilotos"></section>
        </div>
    </main>

    <footer class="rs-footer"></footer>
</div>

<script src="/js/nav.js"></script>
<script src="/js/race-strip.js"></script>
<script src="/js/f1-assets.js"></script>
<script src="/js/rs-api.js"></script>
<script src="/js/favorites.js"></script>
<script src="/js/participants.js"></script>
</body>
</html>
