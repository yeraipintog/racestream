<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceStream - Favoritos</title>
    <link rel="icon" type="image/png" href="/assets/img/LogoRS2.png">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/account.css">
</head>
<body data-rs-private-page="favorites">
<div class="rs-page-shell">
    <header class="rs-navbar" id="mainNavbar"></header>
    <section class="rs-race-strip" id="raceStrip"></section>
    <main class="rs-main rs-simple-page">
        <div class="rs-container">
            <header class="rs-page-head">
                <h1>Favoritos</h1>
                <p>Guarda favoritos desde la estrella de cada piloto, escudería o Gran Premio. Cuando guardes un Gran Premio, podrás seleccionar que sesiones quieres seguir. Desde aquí puedes abrirlos directamente o quitarlos cuando ya no los necesites.</p>
            </header>
            <section class="rs-simple-panel">
                <div id="favoritesList" class="rs-list">
                    <p class="loading-state">Cargando favoritos...</p>
                </div>
            </section>
        </div>
    </main>
    <footer class="rs-footer"></footer>
</div>
<script src="/js/nav.js"></script>
<script src="/js/race-strip.js"></script>
<script src="/js/account.js"></script>
</body>
</html>
