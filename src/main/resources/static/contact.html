<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceStream - Contacto</title>
    <link rel="icon" type="image/png" href="/assets/img/LogoRS2.png">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/account.css">
</head>
<body data-rs-private-page="contact">
<div class="rs-page-shell">
    <header class="rs-navbar" id="mainNavbar"></header>
    <section class="rs-race-strip" id="raceStrip"></section>
    <main class="rs-main rs-simple-page">
        <div class="rs-container">
            <header class="rs-page-head">
                <h1>Contacto</h1>
                <p>Envía incidencias, mejoras o consultas. Los reportes quedan asociados a tu cuenta para poder hacer seguimiento.</p>
            </header>
            <section class="rs-simple-grid">
                <article class="rs-simple-panel">
                    <h2>Enviar mensaje</h2>
                    <form id="contactForm" class="rs-form">
                        <label>
                            Tema
                            <select name="topic" required>
                                <option value="Página">Página</option>
                                <option value="Grand Prix">Grand Prix</option>
                                <option value="Sesión">Sesión</option>
                                <option value="Noticias">Noticias</option>
                                <option value="Otro">Otro</option>
                            </select>
                        </label>
                        <label>
                            Asunto
                            <input name="subject" maxlength="20" required>
                            <small class="rs-char-counter" data-counter-for="subject">0/20</small>
                        </label>
                        <label>
                            Mensaje
                            <textarea name="message" maxlength="1000" required></textarea>
                            <small class="rs-char-counter" data-counter-for="message">0/1000</small>
                        </label>
                        <label class="rs-form__inline">
                            <input name="policyAccepted" type="checkbox" required>
                            <span>Acepto la <a href="/privacy-policy.html#contact-policy">política de privacidad</a> y las <a href="/terms.html#contact-policy">normas de contacto</a> de RaceStream.</span>
                        </label>
                        <button class="rs-button rs-button--primary" type="submit">Enviar</button>
                        <div id="contactAlert" class="rs-alert" aria-live="polite"></div>
                    </form>
                </article>
                <article class="rs-simple-panel">
                    <h2>Soporte RaceStream</h2>
                    <p>Mi cuenta: <strong data-user-email>-</strong></p>
                    <p>El reporte será asignado a un trabajador de <strong>RaceStream</strong> y se resolverá con la mayor brevedad posible.</p>
                </article>
            </section>
        </div>
    </main>
    <footer class="rs-footer"></footer>
</div>
<script src="/js/nav.js"></script>
<script src="/js/race-strip.js"></script>
<script src="/js/account.js"></script>
</body>
</html>
