<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceStream - Noticias F1</title>
    <link rel="icon" type="image/png" href="/assets/img/LogoRS2.png">

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/news.css">
</head>
<body id="top">
<div class="rs-page-shell">
    <header class="rs-navbar" id="mainNavbar"></header>

    <section class="rs-race-strip" id="raceStrip"></section>

    <main class="rs-main rs-news-page">

            <section class="rs-news-head">
                <h1>Noticias Fórmula 1</h1>

            <section id="newsList" class="rs-news-list" aria-live="polite">

            <p class="rs-news-source-note">Noticias recolectadas desde GNews</p>
        </div>
    </main>

    <footer class="rs-footer"></footer>
</div>

<script src="/js/nav.js"></script>
<script src="/js/race-strip.js"></script>
<script src="/js/rs-api.js"></script>
