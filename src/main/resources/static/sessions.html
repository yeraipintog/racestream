<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceStream - Sesiones F1</title>
    <link rel="icon" type="image/png" href="/assets/img/LogoRS2.png">

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/sessions.css">
</head>
<body>
<div class="rs-page-shell">
    <header class="rs-navbar" id="mainNavbar"></header>

    <section class="rs-race-strip" id="raceStrip"></section>

    <main class="rs-main rs-sessions-page">
        <div class="rs-container">
            <section class="rs-calendar-topbar rs-sessions-head" aria-label="Selector de sesiones">
                <div class="rs-calendar-topbar__left">
                    <h1 class="rs-calendar-topbar__title">Sesiones Fórmula 1</h1>
                    <div class="rs-calendar-topbar__controls">
                        <div class="rs-select-wrap rs-select-wrap--inline">
                            <select id="sessionsYearInput" aria-label="Seleccionar temporada">
                                <option value="2023">2023</option>
                                <option value="2024">2024</option>
                                <option value="2025">2025</option>
                                <option value="2026" selected>2026</option>
                            </select>
                        </div>
                        <label class="rs-select-wrap rs-select-wrap--inline rs-sessions-select" aria-label="Seleccionar Gran Premio">
                            <select id="meetingSelect" aria-label="Seleccionar Gran Premio"></select>
                        </label>
                    </div>
                </div>
                <div id="sessionsSelectedGp" class="rs-calendar-topbar__selected">-</div>
            </section>

            <section class="rs-sessions-block">
                <h2 id="sessionsSelectedTitle" class="rs-sessions-selected-title">Cargando gran premio...</h2>
                <section id="sessionsList" class="rs-session-list"></section>
            </section>
        </div>
    </main>

    <footer class="rs-footer"></footer>
</div>

<script src="/js/nav.js"></script>
<script src="/js/race-strip.js"></script>
<script src="/js/f1-assets.js"></script>
<script src="/js/favorites.js"></script>
<script src="/js/sessions.js"></script>
</body>
</html>
