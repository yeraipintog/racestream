<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceStream - Mi Cuenta</title>
    <link rel="icon" type="image/png" href="/assets/img/LogoRS2.png">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/account.css">
</head>
<body data-rs-private-page="account">
<div class="rs-page-shell">
    <header class="rs-navbar" id="mainNavbar"></header>
    <section class="rs-race-strip" id="raceStrip"></section>
    <main class="rs-main rs-simple-page">
        <div class="rs-container">
            <header class="rs-page-head">
                <h1>Mi Cuenta</h1>
                <p>Gestiona tus datos básicos y accede a las zonas privadas de RaceStream.</p>
            </header>
            <section class="rs-simple-grid">
                <article class="rs-simple-panel">
                    <h2>Editar datos</h2>
                    <form id="profileForm" class="rs-form">
                        <label>Nombre de usuario<input name="name" type="text" autocomplete="username" required></label>
                        <label>Email<input name="email" type="email" autocomplete="email" required></label>
                        <button class="rs-button rs-button--primary" type="submit">Guardar cambios</button>
                        <div id="profileAlert" class="rs-alert" aria-live="polite"></div>
                    </form>
                </article>
                <article class="rs-simple-panel">
                    <h2>Accesos de cuenta</h2>
                    <div class="rs-list">
                        <a class="rs-account-link" href="/favorites.html"><strong>Favoritos</strong><span>GP, sesiones y elementos guardados.</span></a>
                        <a class="rs-account-link" href="/preferences.html"><strong>Preferencias</strong><span>Notificaciones y ajustes de experiencia.</span></a>
                        <a class="rs-account-link" href="/privacy.html"><strong>Privacidad</strong><span>Cambio de contraseña y seguridad.</span></a>
                    </div>
                </article>
            </section>
        </div>
    </main>
    <footer class="rs-footer"></footer>
</div>
<script src="/js/nav.js"></script>
<script src="/js/race-strip.js"></script>
<script src="/js/account.js"></script>
</body>
</html>
